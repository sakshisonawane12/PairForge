version: '3.8'
services:
  postgres:
    image: postgres:16
    container_name: pairforge-postgres
    environment:
      POSTGRES_DB: pairforge
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: pairforge-redis
    ports:
      - "6379:6379"