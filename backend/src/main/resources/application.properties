spring.application.name=PairCode-backend
server.port=8080

# PostgreSQL (local pgAdmin)
spring.datasource.url=${jdbc:postgresql://localhost:5432/paircode}
spring.datasource.username=${postgres}
spring.datasource.password=${Coffee}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

#redis
spring.data.redis.ssl.enabled=true
spring.data.redis.host=${SPRING_DATA_REDIS_HOST}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT}
spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD}

# JWT
jwt.secret=${PairCode-super-secret-key-minimum-32-bytes-long}
jwt.expiration-ms=28800000