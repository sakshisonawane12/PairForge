spring.application.name=pairforge-backend
server.port=8080

# PostgreSQL (local pgAdmin)
spring.datasource.url=jdbc:postgresql://localhost:5432/pairforge
spring.datasource.username=postgres
spring.datasource.password=Coffee
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Redis (Docker)
spring.data.redis.host=localhost
spring.data.redis.port=6379


# JWT
jwt.secret=pairforge-super-secret-key-minimum-32-bytes-long
jwt.expiration-ms=28800000